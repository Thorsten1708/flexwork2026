<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Quiz Reset</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
<h2>Quiz Test-Reset</h2>
<p>Loescht alle Quiz-Antworten fuer den aktuellen Monat.</p>
<button onclick="resetQuiz()" style="font-size:18px;padding:12px 24px;background:#CC0000;color:white;border:none;border-radius:8px;cursor:pointer;">
  Reset aktueller Monat
</button>
<pre id="log" style="margin-top:20px;background:#f5f5f5;padding:16px;border-radius:8px;font-size:13px;"></pre>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAq4W1dbbwQKst0ZmZOkITJqYMpALukqHQ",
  authDomain: "flexwork2026.firebaseapp.com",
  projectId: "flexwork2026",
  storageBucket: "flexwork2026.firebasestorage.app",
  messagingSenderId: "618329184932",
  appId: "1:618329184932:web:6da142379d38c89552a431"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function log(msg) { document.getElementById("log").textContent += msg + "\n"; }

async function resetQuiz() {
  const now = new Date();
  const mk = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0");
  log("Loesche Quiz-Daten fuer Monat: " + mk);
  try {
    const snap = await db.collection("quiz").doc(mk).collection("answers").get();
    const batch = db.batch();
    snap.forEach(doc => { log("  - Loesche: " + doc.id); batch.delete(doc.ref); });
    await batch.commit();
    await db.collection("quiz").doc(mk).delete();
    log("Fertig! Monat " + mk + " zurueckgesetzt.");
    log("Du kannst das Quiz jetzt neu starten.");
  } catch(e) {
    log("Fehler: " + e.message);
  }
}
</script>
</body>
</html>
